name: "COD Admin CodeQL Configuration"

# Suppress js/xss-through-dom: CodeQL flags URL.createObjectURL(file) → <img src={url}>
# as XSS. The blob URL is generated from a user-selected File object via <input type="file">,
# not from attacker-controlled text. Four prior fix attempts (blob scheme validation,
# ref-based src, useMemo derivation) failed to break CodeQL's taint chain.
query-filters:
  - exclude:
      id: js/xss-through-dom
